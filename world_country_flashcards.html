* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.controls select { flex: 1; min-width: 140px; }
.card-area { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-secondary); display: flex; align-items: center; justify-content: center; min-height: 340px; position: relative; overflow: hidden; }
#map-svg { max-width: 100%; max-height: 320px; }
#map-svg path { fill: var(--color-text-primary); }
.answer-row { display: flex; gap: 8px; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
.answer-row button { flex: 1; min-width: 120px; }
#reveal-btn { flex: 2; }
#answer-display { margin-top: 0.75rem; text-align: center; font-size: 22px; font-weight: 500; color: var(--color-text-primary); min-height: 36px; }
#counter { font-size: 13px; color: var(--color-text-secondary); margin-top: 0.5rem; text-align: center; }
.region-badge { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 4px; }
</style>
<div id="app">
  <h2 class="sr-only">Country shape flashcards. A silhouette of a country is shown. Try to guess which country it is.</h2>
  <div class="controls">
    <select id="region-select">
      <option value="all">All regions</option>
      <option value="Europe">Europe</option>
      <option value="Asia">Asia</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
      <option value="Oceania">Oceania</option>
    </select>
    <button onclick="shuffle()">↻ Shuffle</button>
  </div>
  <div class="card-area">
    <svg id="map-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><text x="100" y="105" text-anchor="middle" font-size="14" fill="var(--color-text-secondary)">Loading...</text></svg>
  </div>
  <div class="region-badge" id="region-badge"></div>
  <div id="answer-display"></div>
  <div class="answer-row">
    <button id="reveal-btn" onclick="reveal()">Show answer</button>
    <button onclick="next()">Next →</button>
  </div>
  <div id="counter"></div>
</div>

async function loadMap() {
  const res = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json");
  const world = await res.json();
  const geo = topojson.feature(world, world.objects.countries);
  const namesRes = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json");
  // Use a names lookup via a separate small dataset
  const nameRes = await fetch("https://cdn.jsdelivr.net/npm/country-code-lookup/data/lookup.json").catch(() => null);
  
  // Load country names from a reliable source
  const nmRes = await fetch("https://cdn.jsdelivr.net/npm/topojson-specification/README.md").catch(()=>null);

  // Use world atlas which has numeric ISO codes, map to names
  // Load country names JSON
  const cnRes = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json");
  const cnData = await cnRes.json();
  
  // Get names from a CDN-accessible names file
  const namesData = await fetch("https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/package.json").catch(()=>null);
  
  // Use hardcoded numeric->name for top countries, supplement with geo names
  const isoNumToName = await getCountryNames();
  
  countries = geo.features
    .map(f => ({ feature: f, name: isoNumToName[f.id] || null }))
    .filter(c => c.name && c.name.length > 0);
  
  applyFilter();
}

  return numericToName;

function applyFilter() {
  const region = document.getElementById("region-select").value;
  filtered = region === "all" ? [...countries] : countries.filter(c => regionMap[c.name] === region);
  shuffle();
}

function shuffle() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0;
  revealed = false;
  showCard();
}

function showCard() {
  if (!filtered.length) {
    document.getElementById("map-svg").innerHTML = '<text x="100" y="105" text-anchor="middle" font-size="12" fill="var(--color-text-secondary)">No countries in this region.</text>';
    document.getElementById("answer-display").textContent = "";
    document.getElementById("counter").textContent = "";
    document.getElementById("region-badge").textContent = "";
    return;
  }
  revealed = false;
  document.getElementById("answer-display").textContent = "";
  document.getElementById("reveal-btn").textContent = "Show answer";
  const c = filtered[idx];
  renderShape(c.feature);
  document.getElementById("counter").textContent = (idx + 1) + " / " + filtered.length;
  document.getElementById("region-badge").textContent = regionMap[c.name] ? regionMap[c.name] : "";
}

function renderShape(feature) {
  const svg = document.getElementById("map-svg");
  
  // Project using simple equirectangular and fit to viewBox
  const coords = extractCoords(feature.geometry);
  if (!coords.length) return;
  
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  coords.forEach(([x, y]) => { 
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  });
  
  const pad = 10;
  const W = 200 - pad*2, H = 200 - pad*2;
  const scaleX = W / (maxX - minX || 1);
  const scaleY = H / (maxY - minY || 1);
  const scale = Math.min(scaleX, scaleY);
  const offX = pad + (W - (maxX - minX) * scale) / 2;
  const offY = pad + (H - (maxY - minY) * scale) / 2;

  function project([lon, lat]) {
    return [offX + (lon - minX) * scale, offY + (maxY - lat) * scale];
  }

  function ringToPath(ring) {
    return ring.map((pt, i) => {
      const [x, y] = project(pt);
      return (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
    }).join(" ") + " Z";
  }

  let d = "";
  const g = feature.geometry;
  if (g.type === "Polygon") {
    g.coordinates.forEach(ring => { d += ringToPath(ring) + " "; });
  } else if (g.type === "MultiPolygon") {
    g.coordinates.forEach(poly => poly.forEach(ring => { d += ringToPath(ring) + " "; }));
  }

  svg.innerHTML = '<path d="' + d + '" fill="var(--color-text-primary)" stroke="var(--color-background-primary)" stroke-width="0.5"/>';
}

function extractCoords(geometry) {
  let pts = [];
  if (geometry.type === "Polygon") {
    geometry.coordinates.forEach(ring => ring.forEach(pt => pts.push(pt)));
  } else if (geometry.type === "MultiPolygon") {
    geometry.coordinates.forEach(poly => poly.forEach(ring => ring.forEach(pt => pts.push(pt))));
  }
  return pts;
}

function reveal() {
  revealed = true;
  const c = filtered[idx];
  document.getElementById("answer-display").textContent = c.name;
  document.getElementById("reveal-btn").textContent = "✓ Revealed";
}

function next() {
  if (!filtered.length) return;
  idx = (idx + 1) % filtered.length;
  showCard();
}

document.getElementById("region-select").addEventListener("change", applyFilter);

  document.getElementById("map-svg").innerHTML = '<text x="100" y="105" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)">Could not load map data.</text>';
